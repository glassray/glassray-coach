# CI for Glassray Coach — the standalone local trace debugger.
# This repo IS the coach project (it is consumed by the Glassray monorepo as a
# submodule), so CI just drives its own npm scripts across the supported Node
# range. No submodule/token handling needed: the repo root is the npm project.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:ui
      - run: npm run test:egress
